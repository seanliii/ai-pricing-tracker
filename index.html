let currentFilter = 'all';
let currentView = 'cards';
let searchQuery = '';

function getFilteredData() {
  let data = pricingData;
  if (currentFilter !== 'all') { data = data.filter(p => p.type === currentFilter); }
  if (searchQuery) { const q = searchQuery.toLowerCase(); data = data.filter(p => p.name.toLowerCase().includes(q) || p.company.toLowerCase().includes(q)); }
  return data;
}

function renderStats() {
  const data = getFilteredData();
  const paid = data.filter(p => p.monthly > 0);
  const avg = paid.length ? Math.round(paid.reduce((a,p) => a + p.monthly, 0) / paid.length) : 0;
  const min = paid.length ? Math.min(...paid.map(p => p.monthly)) : 0;
  const max = paid.length ? Math.max(...paid.map(p => p.monthly)) : 0;
  const free = data.filter(p => p.freeTier && p.freeTier.includes('免费')).length;
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statMin').textContent = min ? '$'+min : '-';
  document.getElementById('statMax').textContent = max ? '$'+max : '-';
  document.getElementById('statAvg').textContent = avg ? '$'+avg : '-';
  document.getElementById('statFree').textContent = free;
}

function renderCards() {
  const data = getFilteredData();

      '<div class="card-features">'+p.features.slice(0,3).join(' · ')+(p.features.length>3?'...':'')+'</div>'+

        '<span class="card-link">查看详情 →</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderTable() {
  const data = getFilteredData();
  const tbody = document.getElementById('tableBody');
  if (!data.length) { tbody.innerHTML = ''; document.getElementById('noResults').style.display = 'block'; return; }
  document.getElementById('noResults').style.display = 'none';
  const typeMap = { chat:'AI聊天', code:'AI编程', search:'AI搜索', image:'AI图像', video:'AI视频', music:'AI音乐', voice:'AI语音', office:'AI办公', writing:'AI写作' };
  const typeClassMap = { chat:'type-chat', code:'type-code', search:'type-search', image:'type-image', video:'type-video', music:'type-music', voice:'type-voice', office:'type-office', writing:'type-writing' };
  tbody.innerHTML = data.map(p => {
    const priceText = p.monthly === 0 ? '免费' : '$'+p.monthly;
    const annualText = p.annual === 0 ? '免费' : '$'+p.annual+(p.annualDiscount ? '/年' : '');
    return '<tr onclick="openModal('+p.id+')">'+
      '<td><div class="td-name">'+p.name+'</div><div class="td-company">'+p.company+'</div></td>'+
      '<td class="td-company">'+p.company+'</td>'+
      '<td><span class="td-type '+typeClassMap[p.type]+'">'+typeMap[p.type]+'</span></td>'+
      '<td class="td-price">'+priceText+'</td>'+
      '<td>'+annualText+'</td>'+
      '<td>'+p.features.slice(0,2).join(' · ')+'</td>'+
    '</tr>';
  }).join('');
}

function renderAll() {
  renderStats();
  if (currentView === 'cards') { renderCards(); }
  else { renderTable(); }
}

function openModal(id) {
  const p = pricingData.find(x => x.id === id);
  if (!p) return;
  const typeMap = { chat:'AI聊天', code:'AI编程', search:'AI搜索', image:'AI图像', video:'AI视频', music:'AI音乐', voice:'AI语音', office:'AI办公', writing:'AI写作' };
  const typeClassMap = { chat:'type-chat', code:'type-code', search:'type-search', image:'type-image', video:'type-video', music:'type-music', voice:'type-voice', office:'type-office', writing:'type-writing' };
  const priceText = p.monthly === 0 ? '免费' : '$'+p.monthly+'/月';
  const annualText = p.annual === 0 ? '' : '年付 $'+p.annual+(p.annualDiscount ? ' (省'+p.annualDiscount+'%)' : '');
  document.getElementById('modalContent').innerHTML = 
    '<div class="modal-title">'+p.name+'</div>'+
    '<div class="modal-subtitle">'+p.company+' · '+typeMap[p.type]+'</div>'+
    '<div class="modal-tags"><span class="modal-tag '+typeClassMap[p.type]+'">'+typeMap[p.type]+'</span>'+(p.freeTier && p.freeTier.includes('免费') ? '<span class="modal-tag type-chat">有免费版</span>' : '')+'</div>'+
    '<div class="modal-price">'+priceText+(annualText ? '<span class="annual"> · '+annualText+'</span>' : '')+'</div>'+
    '<div class="modal-section"><h3>产品描述</h3><p style="color:#e2e8f0;font-size:0.9rem;line-height:1.6;">'+p.description+'</p></div>'+
    '<div class="modal-section"><h3>核心功能</h3><ul>'+p.features.map(f => '<li>'+f+'</li>').join('')+'</ul></div>'+
    '<div class="modal-section"><h3>免费层级</h3><p style="color:#e2e8f0;font-size:0.9rem;">'+p.freeTier+'</p></div>'+
    '<a href="'+p.website+'" target="_blank" class="modal-link">访问官网 →</a>';
  document.getElementById('modalOverlay').classList.add('active');
}

document.getElementById('modalClose').onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); };
document.getElementById('modalOverlay').onclick = function(e) { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('active'); };

document.getElementById('filterGroup').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    // 重置搜索框，避免分类+搜索叠加导致空结果
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    renderAll();
  }
});

document.querySelectorAll('.view-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentView = btn.dataset.view;
    if (currentView === 'cards') { document.getElementById('cardsView').style.display = 'grid'; document.getElementById('tableView').classList.remove('active'); }
    else { document.getElementById('cardsView').style.display = 'none'; document.getElementById('tableView').classList.add('active'); }
    renderAll();
  });
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  renderAll();
});

renderAll();
</script>
</body>
</html>
